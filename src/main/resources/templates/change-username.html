<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" th:content="${_csrf.token}">
    <meta name="csrf-header" th:content="${_csrf.headerName}">
    <title>Change Username - Volt Scheduler</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="account-page-shell">
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="theme-toggle-floating" title="Toggle dark/light theme">🌙</button>
    </div>

    <div class="hamburger-fixed-wrapper">
        <div class="hamburger-menu-wrapper">
            <button id="hamburger-menu-btn" class="button button-icon hamburger-btn" title="Account menu">
                <span>☰</span>
            </button>
            <div id="hamburger-menu" class="hamburger-menu">
                <button id="hamburger-menu-close-btn" class="button button-icon hamburger-btn hamburger-drawer-toggle" title="Toggle navigation">
                    <span>☰</span>
                </button>
                <div class="hamburger-panel-header">
                    <span class="hamburger-header-title">Navigation</span>
                </div>
                <button id="dashboard-btn" class="hamburger-item">Dashboard</button>
                <button id="change-password-btn" class="hamburger-item">Change Password</button>
                <button id="delete-account-btn" class="hamburger-item danger">Delete Account</button>
            </div>
        </div>
        <div id="hamburger-backdrop" class="hamburger-backdrop"></div>
    </div>

    <div class="auth-card account-form-card">
        <div class="card-content">
            <h2>Update Username</h2>
            
            <div id="usernameError" class="alert error hidden"></div>
            <div id="usernameSuccess" class="alert success hidden"></div>

            <form id="changeUsernameForm">
                <div class="form-group">
                    <label for="newUsername">New Username:</label>
                    <input type="text" id="newUsername" name="newUsername" required autofocus>
                    <small class="form-hint">Username must be unique and at least 3 characters</small>
                </div>

                <div class="button-group">
                    <button type="submit" class="button button-primary">Update Username</button>
                    <a href="/events" class="button button-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            const savedTheme = localStorage.getItem('theme') || 'light';
            
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
            
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            });

            // Change username form

            // Hamburger drawer
            const hamburgerMenuBtn = document.getElementById('hamburger-menu-btn');
            const hamburgerMenuCloseBtn = document.getElementById('hamburger-menu-close-btn');
            const hamburgerMenu = document.getElementById('hamburger-menu');
            const hamburgerBackdrop = document.getElementById('hamburger-backdrop');
            const closeHamburgerMenu = () => {
                hamburgerMenu.classList.remove('is-open');
                hamburgerBackdrop.classList.remove('is-open');
            };
            if (hamburgerMenuBtn) {
                hamburgerMenuBtn.addEventListener('click', () => {
                    hamburgerMenu.classList.toggle('is-open');
                    hamburgerBackdrop.classList.toggle('is-open');
                });
            }
            if (hamburgerMenuCloseBtn) {
                hamburgerMenuCloseBtn.addEventListener('click', () => {
                    hamburgerMenu.classList.toggle('is-open');
                    hamburgerBackdrop.classList.toggle('is-open');
                });
            }
            if (hamburgerBackdrop) {
                hamburgerBackdrop.addEventListener('click', closeHamburgerMenu);
            }
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeHamburgerMenu();
                }
            });
            document.getElementById('dashboard-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/events'; });
            document.getElementById('change-password-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/change-password'; });
            document.getElementById('delete-account-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/delete'; });
            const form = document.getElementById('changeUsernameForm');
            const newUsernameInput = document.getElementById('newUsername');
            const usernameError = document.getElementById('usernameError');
            const usernameSuccess = document.getElementById('usernameSuccess');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                usernameError.classList.add('hidden');
                usernameSuccess.classList.add('hidden');

                const csrfTokenMeta = document.querySelector('meta[name="csrf-token"]');
                const csrfHeaderMeta = document.querySelector('meta[name="csrf-header"]');
                
                if (!csrfTokenMeta || !csrfHeaderMeta) {
                    usernameError.textContent = 'Security token not found. Please refresh the page.';
                    usernameError.classList.remove('hidden');
                    return;
                }
                
                const csrfToken = csrfTokenMeta.getAttribute('content');
                const csrfHeader = csrfHeaderMeta.getAttribute('content');
                
                const headers = {
                    'Content-Type': 'application/json'
                };
                headers[csrfHeader] = csrfToken;
                
                fetch('/account/change-username', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ newUsername: newUsernameInput.value })
                }).then(response => {
                    if (response.ok) {
                        usernameSuccess.textContent = 'Username updated successfully! Please sign in again...';
                        usernameSuccess.classList.remove('hidden');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 1500);
                    } else if (response.status === 400) {
                        return response.text().then(text => {
                            usernameError.textContent = text || 'Invalid username. Please try another.';
                            usernameError.classList.remove('hidden');
                        });
                    } else {
                        usernameError.textContent = 'Failed to update username. Please try again.';
                        usernameError.classList.remove('hidden');
                    }
                }).catch(err => {
                    console.error('Error:', err);
                    usernameError.textContent = 'An error occurred: ' + err.message;
                    usernameError.classList.remove('hidden');
                });
            });
        });
    </script>

<footer class="site-footer">
    <p>&copy; <script>document.write(new Date().getFullYear())</script> Elijah Richter. All rights reserved.</p>
</footer>
</body>
</html>
