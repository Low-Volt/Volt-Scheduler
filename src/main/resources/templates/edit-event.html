<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <meta name="csrf-token" th:content="${_csrf.token}">
    <meta name="csrf-header" th:content="${_csrf.headerName}">
    <script>
        // Dark theme toggle
        const htmlElem = document.documentElement;
        const theme = localStorage.getItem('theme') || 'light';
        htmlElem.setAttribute('data-theme', theme);
    </script>
</head>
<body class="dashboard-shell compact-shell" th:attr="data-theme=${session.theme ?: 'light'}">
<div class="theme-toggle-wrapper">
    <button id="theme-toggle" class="button button-icon theme-toggle-floating" title="Toggle dark mode">
        <span id="theme-icon">🌙</span>
    </button>
</div>
<div class="hamburger-fixed-wrapper">
    <div class="hamburger-menu-wrapper">
        <button id="hamburger-menu-btn" class="button button-icon hamburger-btn" title="Account menu">
            <span>☰</span>
        </button>
        <div id="hamburger-menu" class="hamburger-menu">
            <button id="hamburger-menu-close-btn" class="button button-icon hamburger-btn hamburger-drawer-toggle" title="Toggle navigation">
                <span>☰</span>
            </button>
            <div class="hamburger-panel-header">
                <span class="hamburger-header-title">Navigation</span>
            </div>
            <button id="dashboard-btn" class="hamburger-item">Dashboard</button>
            <button id="change-password-btn" class="hamburger-item">Change Password</button>
            <button id="change-username-btn" class="hamburger-item">Update Username</button>
            <button id="delete-account-btn" class="hamburger-item danger">Delete Account</button>
        </div>
    </div>
    <div id="hamburger-backdrop" class="hamburger-backdrop"></div>
</div>
<main class="editor-layout">
    <section class="card panel narrow">
        <div class="card-header split-header">
            <div>
                <p class="eyebrow">Edit event</p>
                <h1>Update details</h1>
            </div>
            <a class="button button-secondary" th:href="@{/events}">Back</a>
        </div>

        <form class="stack" th:action="@{/events/{eventId}(eventId=${eventId})}" th:object="${eventForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label>
                <span>Event title</span>
                <input type="text" th:field="*{title}" required>
                <small class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
            </label>

            <label>
                <span>Date</span>
                <input type="text" id="eventDatePicker" th:field="*{eventDate}" required placeholder="Select a date">
                <small class="field-error" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}"></small>
            </label>

            <div class="two-column">
                <label>
                    <span>Start time</span>
                    <input type="text" id="startTimePicker" th:field="*{startTime}" placeholder="Select start time">
                </label>

                <label>
                    <span>End time</span>
                    <input type="text" id="endTimePicker" th:field="*{endTime}" placeholder="Select end time">
                    <small class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></small>
                </label>
            </div>

            <label>
                <span>Description</span>
                <textarea th:field="*{description}" rows="5"></textarea>
                <small class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
            </label>

            <button class="button button-primary" type="submit">Save changes</button>
        </form>
    </section>
</main>

<footer class="site-footer">
    <p>&copy; <script>document.write(new Date().getFullYear())</script> Elijah Richter. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const htmlElem = document.documentElement;

    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElem.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            htmlElem.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
    }

    function updateThemeIcon(theme) {
        if (themeIcon) {
            themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
    }

    // Initialize theme icon
    const savedTheme = localStorage.getItem('theme') || 'light';
    updateThemeIcon(savedTheme);

    // Initialize Flatpickr for modern date picker
    const eventDatePicker = document.getElementById('eventDatePicker');
    if (eventDatePicker) {
        flatpickr('#eventDatePicker', {
            dateFormat: 'Y-m-d',
            theme: savedTheme === 'dark' ? 'dark' : 'light'
        });
    }

    // Initialize Flatpickr for time pickers
    const startTimePicker = document.getElementById('startTimePicker');
    if (startTimePicker) {
        flatpickr('#startTimePicker', {
            enableTime: true,
            noCalendar: true,
                enableSeconds: false,
                dateFormat: 'H:i',
                altInput: true,
                altFormat: 'h:i K',
                time_24hr: false,
            theme: savedTheme === 'dark' ? 'dark' : 'light'
        });
    }

    const endTimePicker = document.getElementById('endTimePicker');
    if (endTimePicker) {
        flatpickr('#endTimePicker', {
            enableTime: true,
            noCalendar: true,
            enableSeconds: false,
            dateFormat: 'H:i',
            altInput: true,
            altFormat: 'h:i K',
            time_24hr: false,
            theme: savedTheme === 'dark' ? 'dark' : 'light'
        });
    }

    // Hamburger drawer
    const hamburgerMenuBtn = document.getElementById('hamburger-menu-btn');
    const hamburgerMenuCloseBtn = document.getElementById('hamburger-menu-close-btn');
    const hamburgerMenu = document.getElementById('hamburger-menu');
    const hamburgerBackdrop = document.getElementById('hamburger-backdrop');
    const closeHamburgerMenu = () => {
        hamburgerMenu.classList.remove('is-open');
        hamburgerBackdrop.classList.remove('is-open');
    };
    if (hamburgerMenuBtn) {
        hamburgerMenuBtn.addEventListener('click', () => {
            hamburgerMenu.classList.toggle('is-open');
            hamburgerBackdrop.classList.toggle('is-open');
        });
    }
    if (hamburgerMenuCloseBtn) {
        hamburgerMenuCloseBtn.addEventListener('click', () => {
            hamburgerMenu.classList.toggle('is-open');
            hamburgerBackdrop.classList.toggle('is-open');
        });
    }
    if (hamburgerBackdrop) {
        hamburgerBackdrop.addEventListener('click', closeHamburgerMenu);
    }
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeHamburgerMenu();
        }
    });
    document.getElementById('dashboard-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/events'; });
    document.getElementById('change-password-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/change-password'; });
    document.getElementById('change-username-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/change-username'; });
    document.getElementById('delete-account-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/delete'; });
});
</script>
</body>
</html>
