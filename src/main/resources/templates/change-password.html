<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" th:content="${_csrf.token}">
    <meta name="csrf-header" th:content="${_csrf.headerName}">
    <title>Change Password - Volt Scheduler</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="account-page-shell">
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="theme-toggle-floating" title="Toggle dark/light theme">🌙</button>
    </div>

    <div class="hamburger-fixed-wrapper">
        <div class="hamburger-menu-wrapper">
            <button id="hamburger-menu-btn" class="button button-icon hamburger-btn" title="Account menu">
                <span>☰</span>
            </button>
            <div id="hamburger-menu" class="hamburger-menu">
                <button id="hamburger-menu-close-btn" class="button button-icon hamburger-btn hamburger-drawer-toggle" title="Toggle navigation">
                    <span>☰</span>
                </button>
                <div class="hamburger-panel-header">
                    <span class="hamburger-header-title">Navigation</span>
                </div>
                <button id="dashboard-btn" class="hamburger-item">Dashboard</button>
                <button id="change-username-btn" class="hamburger-item">Update Username</button>
                <button id="delete-account-btn" class="hamburger-item danger">Delete Account</button>
            </div>
        </div>
        <div id="hamburger-backdrop" class="hamburger-backdrop"></div>
    </div>

    <div class="auth-card account-form-card">
        <div class="card-content">
            <h2>Change Password</h2>
            
            <div id="passwordError" class="alert error hidden"></div>
            <div id="passwordSuccess" class="alert success hidden"></div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="currentPassword">Current Password:</label>
                    <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password:</label>
                    <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password">
                    <small class="form-hint">Use at least 8 characters, 1 uppercase letter, 1 special character, and no spaces.</small>
                    <div class="password-strength" id="changePasswordStrength" aria-live="polite">
                        <div class="password-strength-track">
                            <div class="password-strength-fill" id="changePasswordStrengthFill"></div>
                        </div>
                        <small class="password-strength-label" id="changePasswordStrengthLabel">Password strength: --</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
                </div>

                <div class="button-group">
                    <button type="submit" class="button button-primary">Change Password</button>
                    <a href="/events" class="button button-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            const savedTheme = localStorage.getItem('theme') || 'light';
            
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
            
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            });

            // Change password form

            // Hamburger drawer
            const hamburgerMenuBtn = document.getElementById('hamburger-menu-btn');
            const hamburgerMenuCloseBtn = document.getElementById('hamburger-menu-close-btn');
            const hamburgerMenu = document.getElementById('hamburger-menu');
            const hamburgerBackdrop = document.getElementById('hamburger-backdrop');
            const closeHamburgerMenu = () => {
                hamburgerMenu.classList.remove('is-open');
                hamburgerBackdrop.classList.remove('is-open');
            };
            if (hamburgerMenuBtn) {
                hamburgerMenuBtn.addEventListener('click', () => {
                    hamburgerMenu.classList.toggle('is-open');
                    hamburgerBackdrop.classList.toggle('is-open');
                });
            }
            if (hamburgerMenuCloseBtn) {
                hamburgerMenuCloseBtn.addEventListener('click', () => {
                    hamburgerMenu.classList.toggle('is-open');
                    hamburgerBackdrop.classList.toggle('is-open');
                });
            }
            if (hamburgerBackdrop) {
                hamburgerBackdrop.addEventListener('click', closeHamburgerMenu);
            }
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeHamburgerMenu();
                }
            });
            document.getElementById('dashboard-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/events'; });
            document.getElementById('change-username-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/change-username'; });
            document.getElementById('delete-account-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/delete'; });
            const form = document.getElementById('changePasswordForm');
            const currentPasswordInput = document.getElementById('currentPassword');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordError = document.getElementById('passwordError');
            const passwordSuccess = document.getElementById('passwordSuccess');
            const strengthFill = document.getElementById('changePasswordStrengthFill');
            const strengthLabel = document.getElementById('changePasswordStrengthLabel');

            const updatePasswordStrength = (password) => {
                if (!password) {
                    strengthFill.style.width = '0%';
                    strengthFill.className = 'password-strength-fill';
                    strengthLabel.textContent = 'Password strength: --';
                    return;
                }

                const hasUpper = /[A-Z]/.test(password);
                const hasSpecial = /[^A-Za-z0-9]/.test(password);
                const hasLower = /[a-z]/.test(password);
                const hasDigit = /\d/.test(password);
                const hasSpaces = /\s/.test(password);
                const meetsMinimum = password.length >= 8 && hasUpper && hasSpecial && !hasSpaces;

                let level = 'weak';
                if (meetsMinimum) {
                    level = (password.length >= 12 && hasLower && hasDigit) ? 'extra-strong' : 'strong';
                }

                if (level === 'weak') {
                    strengthFill.style.width = '34%';
                    strengthFill.className = 'password-strength-fill weak';
                    strengthLabel.textContent = 'Password strength: Weak';
                } else if (level === 'strong') {
                    strengthFill.style.width = '67%';
                    strengthFill.className = 'password-strength-fill strong';
                    strengthLabel.textContent = 'Password strength: Strong';
                } else {
                    strengthFill.style.width = '100%';
                    strengthFill.className = 'password-strength-fill extra-strong';
                    strengthLabel.textContent = 'Password strength: Extra strong';
                }
            };

            newPasswordInput.addEventListener('input', (e) => updatePasswordStrength(e.target.value));
            updatePasswordStrength(newPasswordInput.value || '');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                passwordError.classList.add('hidden');
                passwordSuccess.classList.add('hidden');

                // Validate passwords match
                if (newPasswordInput.value !== confirmPasswordInput.value) {
                    passwordError.textContent = 'New passwords do not match. Please try again.';
                    passwordError.classList.remove('hidden');
                    return;
                }

                // Validate password length
                if (newPasswordInput.value.length < 8) {
                    passwordError.textContent = 'New password must be at least 8 characters long.';
                    passwordError.classList.remove('hidden');
                    return;
                }

                if (/\s/.test(newPasswordInput.value)) {
                    passwordError.textContent = 'New password must not contain spaces.';
                    passwordError.classList.remove('hidden');
                    return;
                }

                if (!/[A-Z]/.test(newPasswordInput.value)) {
                    passwordError.textContent = 'New password must include at least one uppercase letter.';
                    passwordError.classList.remove('hidden');
                    return;
                }

                if (!/[^A-Za-z0-9]/.test(newPasswordInput.value)) {
                    passwordError.textContent = 'New password must include at least one special character.';
                    passwordError.classList.remove('hidden');
                    return;
                }

                const csrfTokenMeta = document.querySelector('meta[name="csrf-token"]');
                const csrfHeaderMeta = document.querySelector('meta[name="csrf-header"]');
                
                if (!csrfTokenMeta || !csrfHeaderMeta) {
                    passwordError.textContent = 'Security token not found. Please refresh the page.';
                    passwordError.classList.remove('hidden');
                    return;
                }
                
                const csrfToken = csrfTokenMeta.getAttribute('content');
                const csrfHeader = csrfHeaderMeta.getAttribute('content');
                
                const headers = {
                    'Content-Type': 'application/json'
                };
                headers[csrfHeader] = csrfToken;
                
                fetch('/account/change-password', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        currentPassword: currentPasswordInput.value,
                        newPassword: newPasswordInput.value
                    })
                }).then(response => {
                    if (response.ok) {
                        passwordSuccess.textContent = 'Password changed successfully! Redirecting...';
                        passwordSuccess.classList.remove('hidden');
                        setTimeout(() => {
                            window.location.href = '/events';
                        }, 1500);
                    } else if (response.status === 401) {
                        passwordError.textContent = 'Current password is incorrect. Please try again.';
                        passwordError.classList.remove('hidden');
                        currentPasswordInput.value = '';
                        currentPasswordInput.focus();
                    } else {
                        passwordError.textContent = 'Failed to change password. Please try again.';
                        passwordError.classList.remove('hidden');
                    }
                }).catch(err => {
                    console.error('Error:', err);
                    passwordError.textContent = 'An error occurred: ' + err.message;
                    passwordError.classList.remove('hidden');
                });
            });
        });
    </script>

<footer class="site-footer">
    <p>&copy; <script>document.write(new Date().getFullYear())</script> Elijah Richter. All rights reserved.</p>
</footer>
</body>
</html>
