<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" th:content="${_csrf.token}">
    <meta name="csrf-header" th:content="${_csrf.headerName}">
    <title>Delete Account - Volt Scheduler</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="account-page-shell">
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="theme-toggle-floating" title="Toggle dark/light theme">🌙</button>
    </div>

    <div class="hamburger-fixed-wrapper">
        <div class="hamburger-menu-wrapper">
            <button id="hamburger-menu-btn" class="button button-icon hamburger-btn" title="Account menu">
                <span>☰</span>
            </button>
            <div id="hamburger-menu" class="hamburger-menu">
                <button id="hamburger-menu-close-btn" class="button button-icon hamburger-btn hamburger-drawer-toggle" title="Toggle navigation">
                    <span>☰</span>
                </button>
                <div class="hamburger-panel-header">
                    <span class="hamburger-header-title">Navigation</span>
                </div>
                <button id="dashboard-btn" class="hamburger-item">Dashboard</button>
                <button id="change-password-btn" class="hamburger-item">Change Password</button>
                <button id="change-username-btn" class="hamburger-item">Update Username</button>
            </div>
        </div>
        <div id="hamburger-backdrop" class="hamburger-backdrop"></div>
    </div>

    <div class="auth-card account-form-card">
        <div class="card-content">
            <h2>Delete Account</h2>

            <div id="deleteError" class="alert error hidden"></div>

            <div class="warning-box">
                <h3>⚠️ Warning: This action is permanent</h3>
                <p>Deleting your account will permanently remove:</p>
                <ul>
                    <li>Your account and all personal information</li>
                    <li>All your calendar events</li>
                </ul>
                <p>This action cannot be undone.</p>
            </div>

            <form id="deleteAccountForm">
                <div class="form-group">
                    <label for="confirmPassword">Enter your password to confirm deletion:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Enter your password" autocomplete="current-password">
                </div>

                <div class="button-group">
                    <button type="submit" class="button button-danger">Delete Account</button>
                    <a href="/events" class="button button-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            const savedTheme = localStorage.getItem('theme') || 'light';

            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }

            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            });

            // Hamburger drawer
            const hamburgerMenuBtn = document.getElementById('hamburger-menu-btn');
            const hamburgerMenuCloseBtn = document.getElementById('hamburger-menu-close-btn');
            const hamburgerMenu = document.getElementById('hamburger-menu');
            const hamburgerBackdrop = document.getElementById('hamburger-backdrop');
            const closeHamburgerMenu = () => {
                hamburgerMenu.classList.remove('is-open');
                hamburgerBackdrop.classList.remove('is-open');
            };
            if (hamburgerMenuBtn) {
                hamburgerMenuBtn.addEventListener('click', () => {
                    hamburgerMenu.classList.toggle('is-open');
                    hamburgerBackdrop.classList.toggle('is-open');
                });
            }
            if (hamburgerMenuCloseBtn) {
                hamburgerMenuCloseBtn.addEventListener('click', () => {
                    hamburgerMenu.classList.toggle('is-open');
                    hamburgerBackdrop.classList.toggle('is-open');
                });
            }
            if (hamburgerBackdrop) {
                hamburgerBackdrop.addEventListener('click', closeHamburgerMenu);
            }
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeHamburgerMenu();
                }
            });
            document.getElementById('dashboard-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/events'; });
            document.getElementById('change-password-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/change-password'; });
            document.getElementById('change-username-btn')?.addEventListener('click', () => { closeHamburgerMenu(); window.location.href = '/account/change-username'; });

            // Delete account form
            const form = document.getElementById('deleteAccountForm');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const deleteError = document.getElementById('deleteError');

            form.addEventListener('submit', (e) => {
                e.preventDefault();

                deleteError.classList.add('hidden');

                const csrfTokenMeta = document.querySelector('meta[name="csrf-token"]');
                const csrfHeaderMeta = document.querySelector('meta[name="csrf-header"]');

                if (!csrfTokenMeta || !csrfHeaderMeta) {
                    deleteError.textContent = 'Security token not found. Please refresh the page.';
                    deleteError.classList.remove('hidden');
                    return;
                }

                const csrfToken = csrfTokenMeta.getAttribute('content');
                const csrfHeader = csrfHeaderMeta.getAttribute('content');

                const headers = { 'Content-Type': 'application/json' };
                headers[csrfHeader] = csrfToken;

                fetch('/account/delete', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ password: confirmPasswordInput.value })
                }).then(response => {
                    if (response.ok) {
                        window.location.href = '/login';
                    } else if (response.status === 401) {
                        deleteError.textContent = 'Invalid password. Please try again.';
                        deleteError.classList.remove('hidden');
                        confirmPasswordInput.value = '';
                        confirmPasswordInput.focus();
                    } else {
                        deleteError.textContent = 'Failed to delete account. Please try again.';
                        deleteError.classList.remove('hidden');
                    }
                }).catch(err => {
                    console.error('Error:', err);
                    deleteError.textContent = 'An error occurred: ' + err.message;
                    deleteError.classList.remove('hidden');
                });
            });
        });
    </script>

<footer class="site-footer">
    <p>&copy; <script>document.write(new Date().getFullYear())</script> Elijah Richter. All rights reserved.</p>
</footer>
</body>
</html>
