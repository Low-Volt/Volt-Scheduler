services:
  db:
    image: postgres:16-alpine
    container_name: calendar-db
    environment:
      POSTGRES_DB: calendar_app
      POSTGRES_USER: calendar_user
      POSTGRES_PASSWORD: calendar_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_user -d calendar_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: calendar-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/calendar_app
      SPRING_DATASOURCE_USERNAME: calendar_user
      SPRING_DATASOURCE_PASSWORD: calendar_pass
    ports:
      - "8080:8080"

volumes:
  postgres-data: